<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Salud</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .formulario {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .range-value {
            text-align: center;
            margin-top: 5px;
            color: #0077cc;
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background-color: #0077cc;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #005fa3;
        }
    </style>
</head>

<body>

    <div class="formulario">
        <h2>Encuesta de Salud</h2>

        <form>

            <!-- Edad -->
            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad" min="1" max="120" required>

            <!-- Peso -->
            <label for="peso">Peso (kg):</label>
            <input type="number" id="peso" name="peso" min="20" max="300" required>

            <!-- Nivel de dolor -->
            <label for="dolor">Nivel de dolor:</label>
            <input type="range" id="dolor" name="dolor" min="0" max="10" value="5"
                   oninput="valorDolor.textContent = this.value">

            <div class="range-value">
                Nivel: <span id="valorDolor">5</span>
            </div>

            <!-- Tipo de sangre -->
            <label for="sangre">Tipo de sangre:</label>
            <select id="sangre" name="sangre" required>
                <option value="">Selecciona una opción</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
            </select>

            <!-- Botón -->
            <button type="submit">Enviar Encuesta</button>

        </form>
    </div>

</body>
</html>
